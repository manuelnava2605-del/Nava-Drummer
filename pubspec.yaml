name: nava_drummer
description: NavaDrummer — App profesional de aprendizaje de batería con MIDI nativo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Firebase — full suite
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_crashlytics: ^3.4.8
  firebase_analytics: ^10.8.0
  firebase_messaging: ^14.7.10
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # Auth
  google_sign_in: ^6.2.1

  # In-App Purchases (RevenueCat)
  purchases_flutter: ^6.20.2

  # Screen wake lock
  wakelock_plus: ^1.1.4

  # Audio
  just_audio: ^0.9.36      # backing tracks (long-form streaming) — keep
  audio_session: ^0.1.18
  soundpool: ^2.3.1        # drum one-shots (low-latency game audio)

  # MIDI
  plugin_platform_interface: ^2.1.6

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.16.0
  cached_network_image: ^3.3.1

  # Navigation & Deep Links
  go_router: ^12.1.3

  # Storage & Local
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Utils
  uuid: ^4.2.2
  intl: ^0.19.0
  logger: ^2.1.0
  rxdart: ^0.27.7
  collection: ^1.18.0
  package_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.13.1

# App icon generation config
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#07090F"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter:
  uses-material-design: true

  assets:
    - assets/midi/
    - assets/sounds/
    - assets/sounds/drums/kick/
    - assets/sounds/drums/snare/
    - assets/sounds/drums/hihat_closed/
    - assets/sounds/drums/hihat_open/
    - assets/sounds/drums/hihat_pedal/
    - assets/sounds/drums/crash/
    - assets/sounds/drums/crash2/
    - assets/sounds/drums/ride/
    - assets/sounds/drums/ride_bell/
    - assets/sounds/drums/tom1/
    - assets/sounds/drums/tom2/
    - assets/sounds/drums/floor_tom/
    - assets/sounds/drums/rimshot/
    - assets/sounds/drums/crossstick/
    - assets/score/
    - assets/fonts/
    - assets/icon/
    # songs_manifest.json — fallback offline catalog
    # Real song packages viven en Firebase Storage (no bundleados)
    - assets/songs/

  fonts:
    - family: DrummerDisplay
      fonts:
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
    - family: DrummerBody
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
